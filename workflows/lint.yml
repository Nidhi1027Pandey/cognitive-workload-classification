name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff

      - name: Compile check
        run: python -m py_compile src/workload_pipeline.py

      - name: Ruff lint (non-blocking)
        run: ruff check src/ --exit-zero
